<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vy Ngo | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold:#c9a96e; --gold-light:#e8d5b0; --dark:#0a0a0a; --white:#f5f2ed; --muted:rgba(245,242,237,.68); }
    body { background:var(--dark); color:var(--white); font-family:'Jost',sans-serif; overflow-x:hidden; }
    .hero { min-height:100vh; position:relative; display:flex; align-items:center; justify-content:center; text-align:center; padding:2rem; }
    .hero::before { content:""; position:absolute; inset:0; background:linear-gradient(90deg,rgba(0,0,0,.92),rgba(0,0,0,.55)), url('profile.png') center right/contain no-repeat; opacity:.9; }
    .hero::after { content:""; position:absolute; inset:0; background:radial-gradient(circle at center,transparent 25%,rgba(0,0,0,.65)); }
    .nav { position:absolute; top:0; left:0; right:0; z-index:3; display:flex; justify-content:space-between; align-items:center; padding:2rem 3rem; }
    .logo { font-family:'Cormorant Garamond',serif; font-size:22px; letter-spacing:4px; text-transform:uppercase; color:var(--gold-light); text-decoration:none; }
    .nav-links { list-style:none; display:flex; gap:2.2rem; }
    .nav-links a { color:var(--muted); text-decoration:none; font-size:12px; letter-spacing:2px; text-transform:uppercase; }
    .nav-links a:hover { color:var(--gold); }
    .hero-content { position:relative; z-index:2; max-width:760px; animation:fadeUp 1s ease forwards; }
    .eyebrow { color:var(--gold); text-transform:uppercase; letter-spacing:5px; font-size:12px; margin-bottom:1.2rem; }
    h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(54px,9vw,108px); font-weight:300; line-height:.98; margin-bottom:1.4rem; }
    h1 span { color:var(--gold-light); font-style:italic; }
    .subtitle { color:var(--muted); text-transform:uppercase; letter-spacing:2px; font-size:14px; margin-bottom:2.5rem; }
    .btn { display:inline-block; color:var(--dark); background:var(--gold); padding:13px 30px; text-decoration:none; text-transform:uppercase; letter-spacing:3px; font-size:12px; font-weight:500; }
    .btn:hover { background:var(--gold-light); }
    .strip { display:grid; grid-template-columns:repeat(3,1fr); border-top:1px solid rgba(201,169,110,.2); }
    .strip-item { padding:3rem 1rem; text-align:center; border-right:1px solid rgba(201,169,110,.15); }
    .strip-item:last-child { border-right:none; }
    .number { font-family:'Cormorant Garamond',serif; color:var(--gold); font-size:44px; }
    .label { color:var(--muted); text-transform:uppercase; letter-spacing:2px; font-size:11px; }
    footer { display:flex; justify-content:space-between; padding:2rem 3rem; border-top:1px solid rgba(201,169,110,.15); color:rgba(245,242,237,.35); font-size:11px; letter-spacing:2px; text-transform:uppercase; }
    footer a { color:rgba(245,242,237,.45); text-decoration:none; margin-left:1.5rem; }
    footer a:hover { color:var(--gold); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(25px); } to { opacity:1; transform:translateY(0); } }
    @media(max-width:760px){ .nav{padding:1.3rem;}.nav-links{gap:1rem}.hero::before{background:linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.85)),url('profile.png') center/cover no-repeat}.strip{grid-template-columns:1fr}footer{flex-direction:column;gap:1rem} }
  </style>
</head>
<body>
  <section class="hero">
    <nav class="nav">
      <a class="logo" href="index.html">Vy Ngo</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="content.html">About</a></li>
        <li><a href="content.html#projects">Projects</a></li>
        <li><a href="mailto:vy0102@uw.edu">Contact</a></li>
      </ul>
    </nav>
    <div class="hero-content">
      <p class="eyebrow">Welcome to my portfolio</p>
      <h1>Vy Ngo<br><span>Information Systems</span></h1>
      <p class="subtitle">Student · Data Analysis · Business Technology</p>
      <a class="btn" href="content.html">Discover my story</a>
    </div>
  </section>
  <section class="strip">
    <div class="strip-item"><div class="number">3+</div><div class="label">Years work experience</div></div>
    <div class="strip-item"><div class="number">4</div><div class="label">Featured projects</div></div>
    <div class="strip-item"><div class="number">6</div><div class="label">Technical skills</div></div>
  </section>
  <footer>
    <span>© 2026 Vy Ngo</span>
    <span><a href="mailto:vy0102@uw.edu">Email</a><a href="content.html">About</a></span>
  </footer>
</body>
</html>
